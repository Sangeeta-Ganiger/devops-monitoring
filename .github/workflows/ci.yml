name: CI Pipeline

#triggerr run
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t my-webapp ./webapp

      - name: Test container starts
        run: |
          docker run -d --name test-app my-webapp
          sleep 3
          docker logs test-app
          docker stop test-app

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag and push image
        run: |
          docker tag my-webapp ${{ secrets.DOCKERHUB_USERNAME }}/devops-webapp:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/devops-webapp:latest

      - name: Confirm success
        run: echo "Image pushed to Docker Hub successfully"

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            docker pull sangeetaganiger/devops-webapp:latest
            docker stop devops-webapp || true
            docker rm devops-webapp || true
            docker run -d \
              --name devops-webapp \
              --restart always \
              sangeetaganiger/devops-webapp:latest
            echo "Deployment successful"
